<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="board-header">
        <h1 class="board-title">Назва дошки</h1>
        <div class="header-buttons">
            <button id="change-bg-btn" class="header-btn">Змінити фон</button>
            <button class="share-btn" id="exportBtn">Поділитися</button>
        </div>
    </header>

    <main class="board-container" id="board">
        <div class="column">
            <div class="column-header">
                <h2 class="column-title">Текст</h2>
                <span class="column-info">Інформація про стовпець (2)</span>
                <button class="column-options-btn">⋮</button>
            </div>
            
            <div class="card-list">
                <div class="card" draggable="true">
                    <button class="delete-card-btn">Видалити</button>
                    <div class="card-image-placeholder">
                        ПНГ (якщо користувач вставив її)
                    </div>
                    <div class="card-content">
                        Контент
                    </div>
                </div>
                
                <div class="card" draggable="true">
                    <button class="delete-card-btn">Видалити</button>
                    <div class="card-image-placeholder">
                        ПНГ (якщо користувач вставив її)
                    </div>
                    <div class="card-content">
                        Контент
                    </div>
                </div>
            </div>

            <button class="add-card-btn">+</button>
        </div>

        <div class="add-column-wrapper">
            <button class="add-column-btn">Додати колонку</button>
        </div>
    </main>

    <div id="card-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <input type="text" placeholder="Введіть текст задачі..." class="modal-text-input">
            <button class="add-image-btn">+ Додати зображення</button>
            <button class="save-modal-btn">Зберегти</button>
        </div>
    </div>
    <script src="backscript.js"></script>
</body>
</html>
